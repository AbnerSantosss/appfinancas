version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  # 2. Backend (Node.js API + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - APP_URL=${APP_URL}
      - MASTER_EMAIL=${MASTER_EMAIL:-admin@hubfinanceiro.com}
      - MASTER_PASSWORD=${MASTER_PASSWORD:-Mudar@123}
      - MASTER_NAME=${MASTER_NAME:-Administrador}
      - USER_EMAIL=${USER_EMAIL:-}
      - USER_PASSWORD=${USER_PASSWORD:-Mudar@123}
      - USER_NAME=${USER_NAME:-Usuário}
    depends_on:
      - db
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_network
    # Aguarda 5s para o banco subir, aplica schemas, executa seed e inicia
    command: >
      sh -c "sleep 5 && npx prisma db push --skip-generate && node dist/prisma/seed-prod.js && npm start"

  # 3. Frontend (React/Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "${HOST_FRONTEND_PORT:-3025}:3025"
    depends_on:
      - backend
    networks:
      - app_network

  # 4. Interface visual do Banco (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${HOST_PGADMIN_PORT:-5053}:80"
    depends_on:
      - db
    networks:
      - app_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  app_network:
    driver: bridge

volumes:
  pgdata:
  pgadmin_data:
  uploads_data:
